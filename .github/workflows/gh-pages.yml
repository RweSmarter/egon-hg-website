name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.150.0'
          extended: true

      - name: Determine Base URL
        id: baseurl
        run: |
          if [[ "${{ github.repository }}" == "${{ github.repository_owner }}.github.io" ]]; then
            # Repository is named <username>.github.io
            echo "base_url=https://${{ github.repository_owner }}.github.io/" >> $GITHUB_OUTPUT
          else
            # Repository has a different name
            echo "base_url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: hugo --minify --baseURL "${{ steps.baseurl.outputs.base_url }}"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          # cname: egon-hg.de  # Uncomment to set custom domain later